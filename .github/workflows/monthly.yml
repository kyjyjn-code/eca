name: Monthly ECA (월간 자동 수집·게시)

on:
  schedule:
    - cron: '0 0 1 * *'   # 매월 1일 00:00 UTC = 09:00 KST
  workflow_dispatch:      # 수동 실행 버튼 (첫 실행·재실행·급할 때)
    inputs:
      month:
        description: '대상 월 YYYY-MM (비우면 이번 달)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  monthly-eca:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm ci

      - name: 대상 월 결정
        id: month
        run: |
          M="${{ github.event.inputs.month }}"
          if [ -z "$M" ]; then M=$(date -u +%Y-%m); fi
          echo "value=$M" >> "$GITHUB_OUTPUT"
          echo "대상 월: $M"

      - name: Claude Code CLI 설치
        run: npm install -g @anthropic-ai/claude-code

      # --- LLM 단계: 리서치 (사실 정보 수집) ---
      - name: 리서치
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SDC_MONTH: ${{ steps.month.outputs.value }}
        run: |
          claude -p "당신은 SDC ECA 리서치 에이전트입니다. .claude/agents/researcher.md 를 읽고 그대로 따르세요. data/sources.json, data/keywords.json, CLAUDE.md 도 읽고 준수하세요. 이번 달은 ${SDC_MONTH} 입니다. 마감이 이번 달 1일 이후이거나 상시모집인 활동만, 각 활동을 공식 페이지 WebFetch로 확인하고 근거_원문을 남겨 data/raw/${SDC_MONTH}.json (객체 배열)로 저장하세요. 사실 정보 칸만 채우고 판정 칸은 비웁니다. id는 영문슬러그-연도. 결과 보장 표현 금지, HSS/Holyseas 언급 절대 금지, 한국 학생 지원 자격 확인. 오직 data/raw 에만 쓰세요." \
            --dangerously-skip-permissions

      # --- LLM 단계: 큐레이션 (판정·가공) ---
      - name: 큐레이션
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SDC_MONTH: ${{ steps.month.outputs.value }}
        run: |
          claude -p "당신은 SDC ECA 큐레이터 에이전트입니다. .claude/agents/curator.md 를 읽고 그대로 따르세요. data/keywords.json, CLAUDE.md(별점 계산식) 도 준수하세요. data/raw/${SDC_MONTH}.json 을 읽어 판정 칸(대상_학년·마감일·비용_구분·과목태그·키워드·미국입시_관련도·SDC_적합도)을 채워 data/curated/${SDC_MONTH}.json (객체 배열)로 저장하세요. 키워드는 keywords.json 사전 안에서만. 별점은 4기준 계산식 그대로. HSS/Holyseas 금지. 웹검색·git 금지, 오직 data/curated 에만 쓰세요." \
            --dangerously-skip-permissions

      # --- 결정적 스크립트 (병합·링크검증·포스터·엑셀·빌드) ---
      - name: 결정적 파이프라인
        env:
          SDC_MONTH: ${{ steps.month.outputs.value }}
          SDC_SITE_URL: ${{ vars.SITE_URL }}
        run: |
          node scripts/merge.js
          node scripts/check-links.js
          node scripts/fetch-posters.js
          node scripts/export-excel.js
          node scripts/build.js

      - name: PR 변경 요약 생성
        env:
          SDC_MONTH: ${{ steps.month.outputs.value }}
        run: node scripts/pr-summary.js > pr-body.md

      # --- 게시용 PR (라이브 직접 배포 아님. 사람이 승인·머지해야 반영) ---
      - name: 게시용 PR 생성
        uses: peter-evans/create-pull-request@v6
        with:
          branch: eca/update-${{ steps.month.outputs.value }}
          title: "ECA 월간 업데이트 — ${{ steps.month.outputs.value }}"
          body-path: pr-body.md
          commit-message: "chore(eca): ${{ steps.month.outputs.value }} 월간 업데이트"
          add-paths: |
            data/master.json
            data/raw
            data/curated
            docs
            records
